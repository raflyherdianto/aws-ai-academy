server {
    listen 80;
    server_name localhost;

    resolver 127.0.0.11 valid=30s;

    # Proxy file unggahan dari backend
    location ^~ /uploads/ {
        proxy_pass http://academy-backend:8080;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Proxy placeholder OG image dari backend
    location = /assets/placeholder-card-v2.jpg {
        proxy_pass http://academy-backend:8080;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # KRITIS: Semua /v1/share/ request di-proxy ke backend Go
    # Backend Go mendeteksi User-Agent:
    #   - Crawler (WhatsApp/Facebook/dll) -> return OG HTML dengan meta tags
    #   - Manusia biasa -> redirect 302 ke URL frontend dengan ?_spa=1
    # Parameter ?_spa=1 memastikan Nginx tidak proxy lagi ke backend (tidak match ^~ /v1/share/)
    location ^~ /v1/share/ {
        proxy_pass http://academy-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header User-Agent $http_user_agent;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Fallback untuk URL dengan query parameter (setelah redirect dari backend untuk manusia)
    # Vue Router akan menangani /v1/share/... dengan parameter apapun
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
