map $http_user_agent $is_crawler {
    default 0;
    ~*(whatsapp|facebookexternalhit|twitterbot|linkedinbot|telegrambot|slackbot|googlebot) 1;
}

server {
    listen 80;
    server_name localhost;

    # Docker internal DNS resolver untuk menyelesaikan nama container
    resolver 127.0.0.11 valid=30s;

    # Tangkap request ke /v1/share/ dan proxy ke backend JIKA itu crawler (WhatsApp, dll)
    location /v1/share/ {
        if ($is_crawler = 1) {
            set $backend_upstream http://academy-backend:8080;
            proxy_pass $backend_upstream;
            break;
        }
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy file unggahan dan asset dari backend agar image preview WhatsApp bisa diakses via domain frontend
    # Gunakan ^~ agar aturan ini menang melawan regex \.(jpg|png) di bawah
    location ^~ /uploads/ {
        proxy_pass http://academy-backend:8080;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Proxy ke backend untuk placeholder image OG tag
    location = /assets/placeholder-card-v2.jpg {
        proxy_pass http://academy-backend:8080;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        # Try to serve file directly, fallback to index.html for SPA routing
        try_files $uri $uri/ /index.html;
    }

    # Cache control for static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
