map $http_user_agent $og_upstream {
    default "";
    ~*(whatsapp|facebookexternalhit|twitterbot|linkedinbot|telegrambot|slackbot|googlebot) "http://academy-backend:8080";
}

server {
    listen 80;
    server_name localhost;

    resolver 127.0.0.11 valid=30s;

    # Proxy file unggahan dari backend
    location ^~ /uploads/ {
        proxy_pass http://academy-backend:8080;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Proxy placeholder OG image dari backend
    location = /assets/placeholder-card-v2.jpg {
        proxy_pass http://academy-backend:8080;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # KRITIS: /v1/share/ routing tanpa redirect loop
    # - Crawler (WA/FB/dll): proxy ke backend Go untuk mendapat OG HTML
    # - Browser biasa: Nginx langsung serve index.html Vue SPA (TIDAK redirect, TIDAK ke backend)
    location ^~ /share-card/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header User-Agent $http_user_agent;

        # Jika crawler: redirect internal ke route proxy backend
        if ($og_upstream != "") {
            rewrite ^/share-card/(.*)$ /internal-proxy-v1/$1 last;
        }

        # Jika bukan crawler: langsung serve Vue SPA index.html tanpa redirect
        root /usr/share/nginx/html;
        try_files /index.html =503;
    }

    # Location khusus untuk mem-proxy request crawler ke backend lama jika deploy gagal
    location ^~ /internal-proxy-v1/ {
        internal;
        proxy_pass http://academy-backend:8080/v1/share/;
        
        # Mencegah kompresi gzip dari backend agar sub_filter bisa membaca HTML
        proxy_set_header Accept-Encoding "";
        
        # Menonaktifkan semua tag gambar OG secara dinamis
        sub_filter '<meta property="og:image"' '<meta property="ignore:image"';
        sub_filter '<meta name="twitter:image"' '<meta name="ignore:image"';
        sub_filter '<meta property="og:image:type"' '<meta property="ignore:image:type"';
        
        # Menonaktifkan JavaScript redirect
        sub_filter '<script>window.location.href' '<script>var _ignore_redirect';
        
        sub_filter_once off;
    }

    # Catch-all untuk API backend (selain route khusus di atas)
    location ^~ /api/ {
        proxy_pass http://academy-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
