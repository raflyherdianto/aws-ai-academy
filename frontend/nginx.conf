map $http_user_agent $og_upstream {
    default "";
    ~*(whatsapp|facebookexternalhit|twitterbot|linkedinbot|telegrambot|slackbot|googlebot) "http://academy-backend:8080";
}

server {
    listen 80;
    server_name localhost;

    resolver 127.0.0.11 valid=30s;

    # Proxy file unggahan dari backend
    location ^~ /uploads/ {
        proxy_pass http://academy-backend:8080;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Proxy placeholder OG image dari backend
    location = /assets/placeholder-card-v2.jpg {
        proxy_pass http://academy-backend:8080;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # KRITIS: /v1/share/ routing tanpa redirect loop
    # - Crawler (WA/FB/dll): proxy ke backend Go untuk mendapat OG HTML
    # - Browser biasa: Nginx langsung serve index.html Vue SPA (TIDAK redirect, TIDAK ke backend)
    location ^~ /share-card/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header User-Agent $http_user_agent;

        # Jika crawler: proxy ke backend (variable $og_upstream sudah terisi)
        if ($og_upstream != "") {
            rewrite ^/share-card/(.*)$ /v1/share/$1 break;
            proxy_pass http://academy-backend:8080;
        }

        # Jika bukan crawler: langsung serve Vue SPA index.html tanpa redirect
        root /usr/share/nginx/html;
        try_files /index.html =503;
    }

    # Catch-all untuk API backend (selain route khusus di atas)
    location ^~ /api/ {
        proxy_pass http://academy-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
